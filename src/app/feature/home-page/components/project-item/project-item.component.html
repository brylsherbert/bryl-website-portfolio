<a [href]="projectUrl()" target="_blank" rel="noopener noreferrer" class="block">
    <div class="project-card flex flex-col lg:flex-row gap-4 items-center justify-center bg-card rounded-md p-4" >
        <img [src]="imageUrl()" alt="JetStream App" class="rounded-md shadow-md object-contain w-full lg:w-1/3" />
        <div>
            <h3 class="font-semibold text-base mb-1">{{ appName() }}</h3>
            <p class="text-xs text-foreground/70 mb-2 line-clamp-3">{{ appDescription() }} </p>

            <!-- Tech Stacks -->
            <div class="flex flex-wrap gap-1 text-xs">
                @for (stack of techStacks(); track $index) {
                    <span class="bg-accent text-accent-foreground rounded px-2 py-0.5">{{ stack }}</span>
                }
            </div>
        </div>
    </div>
</a>
